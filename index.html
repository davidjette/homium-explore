<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homium | Explore Affordable Homeownership Programs</title>
    <meta name="description" content="Explore the affordability gap in your state and design a custom shared appreciation homeownership program powered by real market data. Built by Homium." />
    <meta property="og:title" content="Homium | Explore Affordable Homeownership Programs" />
    <meta property="og:description" content="Interactive tools to analyze housing affordability and design shared appreciation programs for your community." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@300;400;500;600&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <!-- GA4 — measurement ID injected at build via VITE_GA_MEASUREMENT_ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA support — restore route from 404.html redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
