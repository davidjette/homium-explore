services:
  - type: web
    name: udf-fund-model
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: NODE_ENV=development npm install && npm run build && ls -la dist/db/migrate.js dist/api/server.js
    startCommand: ls -la dist/ && node dist/db/migrate.js && node dist/api/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
